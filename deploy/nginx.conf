server {
    listen 80;
    server_name opora-migration.ru www.opora-migration.ru;

    # Редирект на HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name opora-migration.ru www.opora-migration.ru;

    # SSL — сертификаты Let's Encrypt (certbot)
    ssl_certificate /etc/letsencrypt/live/opora-migration.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/opora-migration.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # === Security Headers ===
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Проксируем всё в Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Статика — напрямую из Next.js (кэш на год)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Загруженные фото — напрямую с диска
    location /uploads/ {
        alias /root/opora-migration/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Certbot — для обновления сертификатов
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
