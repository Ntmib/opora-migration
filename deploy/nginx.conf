# Nginx конфиг для opora-migration.ru
# Сервер: Beget VPS (193.42.124.57)
# Расположение на сервере: /etc/nginx/sites-available/opora-migration
#
# Примечание: SSL-блок добавляется автоматически через certbot:
#   certbot --nginx -d opora-migration.ru -d www.opora-migration.ru

server {
    listen 80;
    server_name opora-migration.ru www.opora-migration.ru;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Загруженные фото — напрямую с диска
    location /uploads/ {
        alias /root/opora-migration/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Certbot — для обновления сертификатов
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
